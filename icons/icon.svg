<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect rx="40" ry="40" width="256" height="256" fill="url(#bg)"/>
  <!-- 视频通话图标 -->
  <g transform="translate(48,56)" fill="#ffffff">
    <!-- 摄像头主体 -->
    <rect x="10" y="30" width="110" height="80" rx="12" ry="12" opacity="0.95"/>
    <!-- 摄像头镜头 -->
    <circle cx="65" cy="70" r="26" fill="#1E88E5" opacity="0.3"/>
    <circle cx="65" cy="70" r="16" fill="#ffffff"/>
    <circle cx="65" cy="70" r="8" fill="#1E88E5"/>
    <!-- 摄像头突出部分 -->
    <path d="M120,50 L150,35 L150,105 L120,90 Z" opacity="0.9"/>
    <!-- 信号波纹 -->
    <path d="M145,20 Q165,55 145,90" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M158,8 Q188,55 158,102" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>
  </g>
</svg>
