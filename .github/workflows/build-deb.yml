name: Build .deb (ARM64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ====== ARM64 版本（目标架构）======
  build-deb-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU（ARM64 模拟）
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 用 arm64 容器运行构建
      - name: Build .deb inside ARM64 container
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v $GITHUB_WORKSPACE:/app \
            -w /app \
            node:20-slim bash -c "
              apt-get update && apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libsecret-1-0 libgbm1 &&\
              npm install &&\
              npx electron-builder --linux deb --arm64
            "

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: trtc-terminal-arm64-deb
          path: dist/*.deb
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          body: '## TRTC 智能终端 v${{ github.ref_name }}\n\nUbuntu ARM64 (.deb) 安装包\n\n**注意**: 此包为交叉编译版本（QEMU 模拟），建议在真实 ARM64 设备上重新构建以获得最佳性能。'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ====== AMD64 版本（方便在普通 x86 Ubuntu 上测试）======
  build-deb-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libsecret-1-0 libgbm1

      - name: Install npm dependencies
        run: npm install

      - name: Build .deb package (amd64)
        run: npx electron-builder --linux deb --x64

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: trtc-terminal-amd64-deb
          path: dist/*.deb
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
