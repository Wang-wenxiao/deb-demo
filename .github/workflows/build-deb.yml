name: Build .deb (ARM64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ====== ARM64 版本 ======
  build-deb-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies for electron-builder (native cross-compile)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libsecret-1-0 libgbm1 \
            fakeroot rpm dpkg

      - name: Install npm dependencies
        run: npm install

      - name: Build .deb package (ARM64 via electron-builder native cross-compile)
        run: npx electron-builder --linux deb --arm64

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: trtc-terminal-arm64-deb
          path: dist/*.deb
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          body: '## TRTC 智能终端 v${{ github.ref_name }}\n\nUbuntu ARM64 (.deb) 安装包'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ====== AMD64 版本（方便测试）======
  build-deb-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libsecret-1-0 libgbm1 fakeroot rpm dpkg

      - name: Install npm dependencies
        run: npm install

      - name: Build .deb package (AMD64)
        run: npx electron-builder --linux deb --x64

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: trtc-terminal-amd64-deb
          path: dist/*.deb
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
