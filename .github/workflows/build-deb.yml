name: Build .deb (ARM64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-deb-arm64:
    runs-on: ubuntu-latest
    # 使用 QEMU 在 x86_64 上交叉编译 ARM64 .deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install QEMU & cross-build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support dpkg-cross
          # 注册 arm64 仿真支持
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes || true

      - name: Install dependencies
        run: npm install

      - name: Build .deb package (cross-compile arm64)
        run: npm run build:deb
        env:
          # electron-builder 交叉编译目标架构
          ELECTRON_BUILDER_ARCH: arm64

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: trtc-terminal-arm64-deb
          path: dist/*.deb
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          body: '## TRTC 智能终端 v${{ github.ref_name }}\n\nUbuntu ARM64 (.deb) 安装包'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deb-amd64:   # 同时构建 amd64 版本，方便测试
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build .deb package (amd64)
        run: npx electron-builder --linux deb --x64

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: trtc-terminal-amd64-deb
          path: dist/*.deb
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
